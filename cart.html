<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-6VR1ZR9HFT"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-6VR1ZR9HFT');
</script>
</head>
<body>

<h2>Your Cart</h2>
<ul id="cart-items"></ul>
<h3 id="total"></h3>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;
let list = document.getElementById("cart-items");

cart.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item.name + " - ₹" + item.price;
    list.appendChild(li);

    total += item.price;
});

document.getElementById("total").innerText = "Total: ₹" + total;
</script>



</body>
</html>
